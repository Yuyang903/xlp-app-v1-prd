<!DOCTYPE html> 
<html lang="zh-CN"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> 
    <title>真实翻书特效 - 点击翻页</title> 
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
    <script src="https://cdn.bootcdn.net/ajax/libs/turn.js/3/turn.min.js"></script> 
    
    <style> 
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        } 

        /* 视口容器：限制书籍最大尺寸并居中 */ 
        #book-viewport { 
            width: 100%;  
            height: 100vh; 
            max-width: 450px; 
            max-height: 800px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            background-color: #000;
        } 

        /* Turn.js 主容器 */ 
        #flipbook { 
            width: 100%; 
            height: 100%; 
        } 

        /* 单页样式 */ 
        .page { 
            width: 100%; 
            height: 100%; 
            background-color: white; 
        } 
        
        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style> 
</head> 
<body> 

<div id="book-viewport"> 
    <div id="flipbook"> 
        <div class="page"><img src="./1.jpg" alt="Image 1"></div> 
        <div class="page"><img src="./2.jpg" alt="Image 2"></div> 
        <div class="page"><img src="./3.jpg" alt="Image 3"></div> 
    </div> 
</div> 

<script> 
    $(document).ready(function() {
        // 初始化 Turn.js 
        $("#flipbook").turn({ 
            display: 'single',    // 强制单页显示
            acceleration: true,   // 开启硬件加速 
            gradients: true,      // 开启翻页阴影渐变 
            elevation: 50,        // 翻页时的拉起高度 
            duration: 800         // 翻页动画时长 
        }); 

        // 点击容器任意位置触发翻下一页
        $("#book-viewport").on("click", function() {
            $("#flipbook").turn("next");
        });
    });
</script> 

</body> 
</html>
