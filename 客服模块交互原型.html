<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>享乐派App_v1.0 - 客服中心原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #e0e5ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .device-frame { width: 375px; height: 812px; background-color: #f5f6f8; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; border-radius: 40px; border: 12px solid #000; display: flex; flex-direction: column; }
        .status-bar { height: 44px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; font-size: 13px; font-weight: 600; color: #000; position: absolute; top: 0; left: 0; z-index: 100; }
        .status-bar svg { stroke: #000; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 28px; background-color: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 105; }
        
        /* Header */
        .header { height: 88px; padding-top: 44px; background-color: #fff; display: flex; align-items: center; padding-left: 20px; padding-right: 20px; border-bottom: 1px solid #eee; position: relative; z-index: 90;}
        .back-btn { font-size: 20px; color: #333; cursor: pointer; width: 30px;}
        .title { flex: 1; text-align: center; font-size: 17px; font-weight: bold; color: #333; margin-right: 30px; }

        /* Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 30px;}
        .chat-container::-webkit-scrollbar { display: none; }
        .time-tip { text-align: center; color: #999; font-size: 12px; margin-bottom: 20px; }
        
        .message { display: flex; margin-bottom: 20px; }
        .message.left { justify-content: flex-start; }
        .message.right { justify-content: flex-end; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background-size: cover; background-position: center;}
        .avatar.cs { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%234ad8db"/><circle cx="50" cy="40" r="15" fill="%23fff"/><path d="M20 90 Q50 60 80 90" stroke="%23fff" stroke-width="8" fill="none"/></svg>'); }
        .avatar.user { background-color: #333; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23ccc"/><circle cx="50" cy="50" r="30" fill="%23fff"/></svg>'); }
        
        .msg-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .message.left .msg-content { background-color: #fff; color: #333; margin-left: 10px; border-top-left-radius: 2px; box-shadow: 0 2px 6px rgba(0,0,0,0.02);}
        .message.right .msg-content { background-color: #4ad8db; color: #000; margin-right: 10px; border-top-right-radius: 2px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);}
        
        .faq-card { background: #fff; border-radius: 12px; padding: 15px; margin-left: 10px; width: 240px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); border-top-left-radius: 2px;}
        .faq-title { font-weight: bold; margin-bottom: 10px; font-size: 14px; color: #333; display: flex; align-items: center; gap: 5px;}
        .faq-item { color: #3498db; font-size: 13px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .faq-item:last-child { border-bottom: none; padding-bottom: 0; }

        /* Input Area */
        .input-area { background-color: #f5f6f8; padding: 10px 15px 30px; display: flex; align-items: center; gap: 10px; position: relative; z-index: 10; border-top: 1px solid #e0e0e0; }
        .plus-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #333; display: flex; justify-content: center; align-items: center; color: #333; font-size: 20px; font-weight: 300; cursor: pointer; }
        .input-box { flex: 1; height: 40px; background-color: #fff; border-radius: 20px; border: 1px solid #ddd; padding: 0 15px; font-size: 14px; outline: none; }
        .send-btn { background-color: #4ad8db; color: #000; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; display: none; transition: 0.2s;}

        .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 130px; height: 4px; background-color: #000; border-radius: 2px; z-index: 200; }
    </style>
</head>
<body>
<div class="device-frame">
    <div class="notch"></div>
    <div class="status-bar">
        <span id="clock">12:00</span>
        <span>
            <svg width="16" height="14" viewBox="0 0 16 14" fill="none" stroke-width="1.5"><path d="M1 13h14M4 9h8M7 5h2"></path></svg>
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke-width="1.5" style="margin-left: 5px;"><rect x="1" y="3" width="14" height="8" rx="2"></rect><path d="M17 6v2"></path></svg>
        </span>
    </div>

    <div class="header">
        <div class="back-btn" onclick="alert('返回上一页')">⟨</div>
        <div class="title">在线客服</div>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="time-tip">今天 10:24</div>
        
        <div class="message left">
            <div class="avatar cs"></div>
            <div class="faq-card">
                <div class="faq-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ad8db" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    猜您想问
                </div>
                <div class="faq-item" onclick="sendMsg('实体专辑什么时候发货？')">1. 实体专辑什么时候发货？</div>
                <div class="faq-item" onclick="sendMsg('NFC感应失败怎么办？')">2. NFC感应失败怎么办？</div>
                <div class="faq-item" onclick="sendMsg('如何修改收货地址？')">3. 如何修改收货地址？</div>
                <div class="faq-item" onclick="sendMsg('账号如何注销？')">4. 账号如何注销？</div>
                <div class="faq-item" style="color: #333; font-weight: bold; text-align: center; margin-top: 5px;" onclick="sendMsg('人工客服')">转人工客服</div>
            </div>
        </div>

        <div class="message right">
            <div class="msg-content">你好，请问编码小卡可以交易吗？</div>
            <div class="avatar user"></div>
        </div>

        <div class="message left">
            <div class="avatar cs"></div>
            <div class="msg-content">您好，目前App内暂未开放官方交易或转赠功能，请您妥善保管您的账号与数字资产。未来如有相关功能上线，我们将第一时间在系统通知中公告，感谢您的支持！</div>
        </div>
    </div>

    <div class="input-area">
        <div class="plus-btn">+</div>
        <input type="text" class="input-box" id="msg-input" placeholder="请输入您的问题..." oninput="toggleSendBtn()" onkeypress="handleEnter(event)">
        <button class="send-btn" id="send-btn" onclick="handleSend()">发送</button>
    </div>

    <div class="home-indicator"></div>
</div>

<script>
    // 时间
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }, 1000);

    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const plusBtn = document.querySelector('.plus-btn');
    const chatContainer = document.getElementById('chat-container');

    function toggleSendBtn() {
        if (input.value.trim().length > 0) {
            sendBtn.style.display = 'block';
            plusBtn.style.display = 'none';
        } else {
            sendBtn.style.display = 'none';
            plusBtn.style.display = 'flex';
        }
    }

    function handleEnter(e) {
        if(e.key === 'Enter') {
            handleSend();
        }
    }

    function sendMsg(text) {
        appendMsg(text, 'right');
        setTimeout(() => {
            if(text === '人工客服' || text === '转人工客服') {
                appendMsg('正在为您转接人工客服，请稍候...', 'left');
            } else {
                appendMsg('这是一条自动回复。您可以输入“人工客服”与我们的客服人员沟通。', 'left');
            }
        }, 800);
    }

    function handleSend() {
        const text = input.value.trim();
        if(text) {
            sendMsg(text);
            input.value = '';
            toggleSendBtn();
        }
    }

    function appendMsg(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${side}`;
        
        let html = '';
        if(side === 'right') {
            html = `<div class="msg-content">${text}</div><div class="avatar user"></div>`;
        } else {
            html = `<div class="avatar cs"></div><div class="msg-content">${text}</div>`;
        }
        msgDiv.innerHTML = html;
        chatContainer.appendChild(msgDiv);
        
        // 滚动到底部
        setTimeout(() => {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }, 50);
    }
</script>
</body>
</html>
