<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知模块交互原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .device-container {
            width: 390px;
            height: 844px;
            background-color: #121212;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 40px;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            flex-shrink: 0;
        }

        .dynamic-island {
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 15px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Header */
        .header {
            padding: 20px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            font-weight: bold;
        }

        .clear-btn {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        /* Message List */
        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-list::-webkit-scrollbar {
            display: none;
        }

        /* Notice Card Style (Similar to Rights tab) */
        .notice-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .notice-img {
            width: 100%;
            height: 160px;
            background: #333;
            object-fit: cover;
        }

        .notice-content {
            padding: 15px;
        }

        .notice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .notice-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notice-time {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .notice-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .notice-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }

        .notice-footer:active {
            opacity: 0.7;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            background: #ff3b30;
            border-radius: 50%;
            display: inline-block;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.4);
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            fill: rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 16px;
        }

        /* Dev Tools */
        .dev-tools {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 200;
        }

        .dev-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="device-container">
    <div class="status-bar">
        <span>09:41</span>
        <div class="dynamic-island"></div>
        <div class="status-icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 9.5C1 10.3284 1.67157 11 2.5 11H13.5C14.3284 11 15 10.3284 15 9.5V2.5C15 1.67157 14.3284 1 13.5 1H2.5C1.67157 1 1 1.67157 1 2.5V9.5Z" stroke="white" stroke-width="1.5"/>
                <path d="M17 4V8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M3 3H13V9H3V3Z" fill="white"/>
            </svg>
        </div>
    </div>

    <div class="header">
        <div class="page-title">消息</div>
        <div class="clear-btn" onclick="clearAll()">全部已读</div>
    </div>

    <!-- Filled State -->
    <div class="message-list" id="msgList">
        <!-- Msg 1: Graphic Notice -->
        <div class="notice-card">
            <img src="https://images.unsplash.com/photo-1540039155732-684736382809?auto=format&fit=crop&w=800&q=80" alt="Concert" class="notice-img">
            <div class="notice-content">
                <div class="notice-header">
                    <div class="notice-title">
                        <span class="unread-dot"></span>
                        线下打卡活动开启
                    </div>
                    <div class="notice-time">昨天 14:30</div>
                </div>
                <div class="notice-desc">
                    演唱会专属NFC打卡活动已开启！在场馆寻找公用NFC感应点，集齐7个子徽章即可合成完整高级徽章，解锁惊喜福利！
                </div>
                <div class="notice-footer">
                    <span>查看详情</span>
                    <span>›</span>
                </div>
            </div>
        </div>

        <!-- Msg 2: Text Notice -->
        <div class="notice-card">
            <div class="notice-content">
                <div class="notice-header">
                    <div class="notice-title">
                        <span class="unread-dot"></span>
                        订单发货通知
                    </div>
                    <div class="notice-time">刚刚</div>
                </div>
                <div class="notice-desc" style="-webkit-line-clamp: 4;">
                    您购买的《除了快乐禁止入内》A平台特典版实体专辑已发货。<br>
                    快递公司：顺丰速运<br>
                    快递单号：SF1234567890<br>
                    请注意查收您的包裹，并在收到后及时绑定获取数字资产。
                </div>
                <div class="notice-footer">
                    <span>查看物流</span>
                    <span>›</span>
                </div>
            </div>
        </div>

        <!-- Msg 3: Text Notice (Read) -->
        <div class="notice-card">
            <div class="notice-content">
                <div class="notice-header">
                    <div class="notice-title">
                        <span class="unread-dot" style="display: none;"></span>
                        社区互动提醒
                    </div>
                    <div class="notice-time">星期二</div>
                </div>
                <div class="notice-desc">
                    用户 "MusicLover" 赞了你在《STUPID POP SONGS》社区发布的动态：“这首歌的编曲真的太惊艳了！”
                </div>
                <div class="notice-footer">
                    <span>点击查看</span>
                    <span>›</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/><line x1="2" y1="2" x2="22" y2="22" stroke="rgba(255,255,255,0.1)" stroke-width="2"/></svg>
        <div class="empty-text">暂无任何消息</div>
    </div>

    <div class="dev-tools">
        <button class="dev-btn" onclick="toggleState(true)">模拟有消息</button>
        <button class="dev-btn" onclick="toggleState(false)">模拟无消息</button>
    </div>

</div>

<script>
    function toggleState(hasMsg) {
        document.getElementById('msgList').style.display = hasMsg ? 'flex' : 'none';
        document.getElementById('emptyState').style.display = hasMsg ? 'none' : 'flex';
    }

    function clearAll() {
        const dots = document.querySelectorAll('.unread-dot');
        dots.forEach(dot => dot.style.display = 'none');
        alert('消息已全部标记为已读');
    }
</script>
</body>
</html>
